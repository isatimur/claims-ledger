name: Deploy website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Do not cancel in-progress deploys — cancelling mid-flight causes
# "Deployment failed, try again later" on the next push-triggered run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install & build website
        working-directory: website
        run: |
          npm ci
          npm run build
          touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v4
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment-retry.outputs.page_url || steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: Fail if deployment unsuccessful
        if: steps.deployment.outcome != 'success' && steps.deployment-retry.outcome != 'success'
        run: |
          echo "Pages deployment failed after retry"
          exit 1
